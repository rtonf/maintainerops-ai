name: MaintainerOps AI
description: Generate human-reviewed PR and issue triage packets for OSS maintainers.
author: MaintainerOps AI contributors
branding:
  icon: shield
  color: blue
inputs:
  mode:
    description: "Analysis mode: pull_request, issue, or fixture"
    required: true
  repo:
    description: "Repository in owner/name format"
    required: false
  number:
    description: "Issue or pull request number"
    required: false
  fixture:
    description: "Path to local fixture JSON"
    required: false
  format:
    description: "Output format: markdown or json"
    default: markdown
  offline:
    description: "Force deterministic offline analysis without calling the OpenAI API"
    default: "false"
  authorized:
    description: "Set to true only when you own, maintain, or have permission to review the target repository"
    default: "false"
runs:
  using: composite
  steps:
    - name: Install MaintainerOps AI dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci
    - name: Build MaintainerOps AI action runtime
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build:cli
    - name: Generate maintainer review packet
      shell: bash
      working-directory: ${{ github.action_path }}
      run: node dist/action.js
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_NUMBER: ${{ inputs.number }}
        INPUT_FIXTURE: ${{ inputs.fixture }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OFFLINE: ${{ inputs.offline }}
        INPUT_AUTHORIZED: ${{ inputs.authorized }}
