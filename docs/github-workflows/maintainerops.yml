name: MaintainerOps AI

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Analyze pull request
        if: github.event_name == 'pull_request_target'
        uses: rtonf/maintainerops-ai@9efb9d78b37bcf81d9b7f44f5156a4c14f0da919
        with:
          mode: pull_request
          repo: ${{ github.repository }}
          number: ${{ github.event.pull_request.number }}
          format: markdown
          offline: true
          authorized: true
      - name: Analyze issue
        if: github.event_name == 'issues'
        uses: rtonf/maintainerops-ai@9efb9d78b37bcf81d9b7f44f5156a4c14f0da919
        with:
          mode: issue
          repo: ${{ github.repository }}
          number: ${{ github.event.issue.number }}
          format: markdown
          offline: true
          authorized: true
